---
- name: Build custom Jenkins image
  docker_image:
    name: custom-jenkins-docker
    source: build
    build:
      path: ../jenkins-docker

- name: Remove old Jenkins container if exists
  docker_container:
    name: jenkins
    state: absent
    force_kill: true

- name: Start Jenkins container
  docker_container:
    name: jenkins
    image: custom-jenkins-docker
    state: started
    restart_policy: always
    user: root
    ports:
      - "8080:8080"
      - "50000:50000"
    env:
      KUBECONFIG: /root/.kube/config
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
      - /Users/lucatelli/.kube:/root/.kube
      - /Users/lucatelli/.minikube:/root/.minikube

- name: Wait for Jenkins startup
  pause:
    seconds: 15

- name: Get Minikube IP
  command: minikube ip
  register: minikube_ip
  changed_when: false

- name: Replace localhost API server with Minikube IP
  command: >
    docker exec jenkins
    sed -i
    's|https://127.0.0.1:[0-9]*|https://{{ minikube_ip.stdout }}:8443|g'
    /root/.kube/config

- name: Fix Minikube certificate paths
  command: >
    docker exec jenkins
    sed -i
    's|/Users/lucatelli/.minikube|/root/.minikube|g'
    /root/.kube/config

- name: Set minikube context
  command: docker exec jenkins kubectl config use-context minikube

- name: Verify Kubernetes connection
  command: docker exec jenkins kubectl get nodes
  register: kube_check
  changed_when: false

- name: Show Kubernetes connection result
  debug:
    var: kube_check.stdout
