- name: Start Jenkins container
  docker_container:
    name: jenkins
    image: custom-jenkins-docker
    state: started
    restart_policy: always
    user: root
    ports:
      - "8080:8080"
      - "50000:50000"
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
