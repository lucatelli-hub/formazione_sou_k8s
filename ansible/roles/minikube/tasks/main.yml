---
- name: Check Minikube status
  command: minikube status
  register: minikube_status
  changed_when: false
  failed_when: false

- name: Start Minikube if not running
  command: minikube start --driver=docker
  when: "'Running' not in minikube_status.stdout"

# evita problemi col kubeconfig locale
- name: Fix Minikube kubeconfig context
  command: minikube update-context
  environment:
    CHANGE_MINIKUBE_NONE_USER: true
  changed_when: false

- name: Get Minikube IP
  command: minikube ip
  register: minikube_ip
  changed_when: false

- name: Show Minikube IP
  debug:
    var: minikube_ip.stdout

- name: Create namespace formazione-sou
  command: kubectl create namespace formazione-sou
  failed_when: false
  changed_when: false


############################################
# BONUS TRACK -> INGRESS NGINX
############################################

- name: Enable Minikube ingress addon
  command: minikube addons enable ingress
  register: ingress_result
  changed_when: "'enabled' in ingress_result.stdout"

- name: Wait for ingress controller deployment
  command: >
    kubectl wait
    --namespace ingress-nginx
    --for=condition=available deployment
    ingress-nginx-controller
    --timeout=180s
  changed_when: false

- name: Show ingress status
  command: kubectl get pods -n ingress-nginx
  register: ingress_status
  changed_when: false

- name: Print ingress pods
  debug:
    var: ingress_status.stdout
